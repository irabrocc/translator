<!doctype html>
<html lang="zh">
  <head>
    <meta charset="utf-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'"
    />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: rgba(0,0,0,0.5); cursor: crosshair; user-select: none; }
      #mask { position: fixed; inset: 0; }
      #sel { position: fixed; border: 2px solid #4aa3ff; background: rgba(74,163,255,0.12); pointer-events: none; display: none; box-shadow: 0 0 0 9999px rgba(0,0,0,0.35); }
      #hint { position: fixed; top: 16px; left: 50%; transform: translateX(-50%); color: #fff; font: 13px/1.4 system-ui, sans-serif; background: rgba(0,0,0,0.5); padding: 6px 12px; border-radius: 6px; pointer-events: none; }
      #size { position: fixed; color: #fff; font: 12px system-ui, monospace; background: rgba(0,0,0,0.6); padding: 2px 6px; border-radius: 4px; display: none; pointer-events: none; }
    </style>
  </head>
  <body>
    <div id="mask"></div>
    <div id="sel"></div>
    <div id="size"></div>
    <div id="hint">拖拽选择区域 · Esc 取消</div>
    <script type="module" src="selector.js"></script>
  </body>
</html>
